[tool.ruff]
target-version = "py312"
line-length = 120
src = ["app", "tests", "scripts"]

[tool.ruff.lint]
select = [
  "E", "F", "W",
  "I",
  "UP",
  "B",
  "SIM",
  "ASYNC",
]
ignore = [
  "B008",    # Depends() in FastAPI defaults — intentional
  "SIM108",  # ternary readability in services
  "SIM102",  # nested if in vk webhook — readability
  "SIM103",  # return condition — minor
  "SIM110",  # any() one-liner — minor
  "ASYNC109", # httpx timeout params in async code — acceptable
  "ASYNC221", # subprocess in seed script — one-off bootstrap
]

[tool.ruff.lint.per-file-ignores]
"alembic/versions/*.py" = ["E501"]
"scripts/*.py" = ["E402", "E501"]
"app/services/map_routes.py" = ["E501"]
"app/services/pushkin_places_seed.py" = ["E501"]
"app/services/place_cleanup.py" = ["E501"]
"app/services/gemini.py" = ["E501"]
"app/api/v1/public_info.py" = ["E501"]

[tool.ruff.format]
quote-style = "double"

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]
filterwarnings = [
  "ignore::DeprecationWarning",
]
