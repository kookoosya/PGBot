server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    resolver 1.1.1.1 8.8.8.8 valid=300s ipv6=off;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Прокси карт — тайлы с нашего домена (без блокировок Google/OSM с телефона)
    location ~ ^/tiles/osm/(\d+)/(\d+)/(\d+)\.png$ {
        proxy_pass https://tile.openstreetmap.org/$1/$2/$3.png;
        proxy_ssl_server_name on;
        proxy_set_header Host tile.openstreetmap.org;
        proxy_hide_header Set-Cookie;
        add_header Cache-Control "public, max-age=604800" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    location ~ ^/tiles/sat/(\d+)/(\d+)/(\d+)$ {
        proxy_pass https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/$1/$2/$3;
        proxy_ssl_server_name on;
        proxy_set_header Host server.arcgisonline.com;
        proxy_hide_header Set-Cookie;
        add_header Cache-Control "public, max-age=604800" always;
    }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location /images/ {
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
