name: CI

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:
    branches: [main, "cursor/**"]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_db
      DATABASE_URL_SYNC: postgresql://postgres:postgres@localhost:5432/test_db
      SECRET_KEY: ci-test-secret-key-not-for-production-use
      DEBUG: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Ruff lint
        working-directory: backend
        run: ruff check app tests scripts

      - name: Ruff format
        working-directory: backend
        run: ruff format --check app tests scripts

      - name: Alembic migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Pytest
        working-directory: backend
        run: pytest -q

      - name: Import smoke
        working-directory: backend
        run: python -c "from app.main import app; print('OK:', app.title)"

      - name: pip-audit
        working-directory: backend
        run: pip-audit -r requirements.txt

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        working-directory: frontend
        run: npm install

      - name: ESLint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build
