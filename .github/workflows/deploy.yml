name: Deploy VPS

on:
  push:
    branches: [cursor/narodny-kontrol-mvp-e7fb]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 192.210.213.135
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/pgbot
            git fetch origin cursor/narodny-kontrol-mvp-e7fb
            git checkout cursor/narodny-kontrol-mvp-e7fb
            git pull origin cursor/narodny-kontrol-mvp-e7fb
            docker compose -f docker-compose.prod.yml up -d --build
            docker compose -f docker-compose.prod.yml exec -T backend alembic upgrade head
